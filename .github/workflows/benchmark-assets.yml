name: Benchmark asset refresh

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: benchmark-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      CI: "true"
      JAVA_TOOL_OPTIONS: "--enable-native-access=ALL-UNNAMED"
      BENCHMARK_ENGINES: "sqlite,duckdb,decentdb,h2,derby,hsqldb"
      ROOT_README_EXTRA_ENGINES: "H2(JDBC),HSQLDB(JDBC)"
      BENCHMARK_OPS_LIST: "10,50,100,250,500"
      BENCHMARK_TARGET_OPS: "500"
      BENCHMARK_WARMUP: "50"
      BENCHMARK_CUSTOMERS: "100"
      BENCHMARK_ORDERS: "500"
      BENCHMARK_EVENTS: "500"
      H2_VERSION: "2.2.224"
      DERBY_VERSION: "10.16.1.1"
      HSQLDB_VERSION: "2.7.4"
      DECENTDB_NATIVE_LIB: ${{ github.workspace }}/target/release/libdecentdb.so

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            benchmarks/python_embedded_compare/requirements.txt
            bindings/python/pyproject.toml

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Python benchmark dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r benchmarks/python_embedded_compare/requirements.txt
          pip install -e bindings/python

      - name: Provision JDBC jars
        shell: bash
        run: |
          set -euo pipefail
          jars_dir=".tmp/benchmark-assets/jars"
          mkdir -p "$jars_dir"

          curl --fail --location --retry 5 --retry-all-errors --silent --show-error \
            -o "$jars_dir/h2.jar" \
            "https://repo1.maven.org/maven2/com/h2database/h2/${H2_VERSION}/h2-${H2_VERSION}.jar"

          curl --fail --location --retry 5 --retry-all-errors --silent --show-error \
            -o "$jars_dir/derby.jar" \
            "https://repo1.maven.org/maven2/org/apache/derby/derby/${DERBY_VERSION}/derby-${DERBY_VERSION}.jar"

          curl --fail --location --retry 5 --retry-all-errors --silent --show-error \
            -o "$jars_dir/derbyshared.jar" \
            "https://repo1.maven.org/maven2/org/apache/derby/derbyshared/${DERBY_VERSION}/derbyshared-${DERBY_VERSION}.jar"

          curl --fail --location --retry 5 --retry-all-errors --silent --show-error \
            -o "$jars_dir/hsqldb.jar" \
            "https://repo1.maven.org/maven2/org/hsqldb/hsqldb/${HSQLDB_VERSION}/hsqldb-${HSQLDB_VERSION}.jar"

      - name: Write benchmark config
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/benchmark-assets/config .tmp/benchmark-assets/decentdb-tmp
          cat > .tmp/benchmark-assets/config/database_configs.yaml <<EOF
          engines:
            sqlite:
              enabled: true
              variant: wal_full
            duckdb:
              enabled: true
            decentdb:
              enabled: true
              temp_dir: ${GITHUB_WORKSPACE}/.tmp/benchmark-assets/decentdb-tmp
            h2:
              enabled: true
              jdbc_url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
              driver_class: org.h2.Driver
              jar_paths:
                - ${GITHUB_WORKSPACE}/.tmp/benchmark-assets/jars/h2.jar
            derby:
              enabled: true
              jdbc_url: jdbc:derby:{db_path};create=true
              driver_class: org.apache.derby.iapi.jdbc.AutoloadedDriver
              jar_paths:
                - ${GITHUB_WORKSPACE}/.tmp/benchmark-assets/jars/derby.jar
                - ${GITHUB_WORKSPACE}/.tmp/benchmark-assets/jars/derbyshared.jar
            hsqldb:
              enabled: true
              jdbc_url: jdbc:hsqldb:file:{db_path};hsqldb.write_delay=false
              driver_class: org.hsqldb.jdbc.JDBCDriver
              jar_paths:
                - ${GITHUB_WORKSPACE}/.tmp/benchmark-assets/jars/hsqldb.jar
          EOF

      - name: Build release native library
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p decentdb --release --quiet

      - name: Generate native benchmark summary
        shell: bash
        run: |
          set -euo pipefail
          cargo bench -p decentdb --bench embedded_compare --quiet

      - name: Refresh workload C docs assets
        shell: bash
        run: |
          set -euo pipefail
          python benchmarks/python_embedded_compare/comparison_runner.py \
            --config .tmp/benchmark-assets/config/database_configs.yaml \
            --engines "$BENCHMARK_ENGINES" \
            --workload workload_c \
            --scenario benchmark-assets \
            --transaction-mode batched \
            --durability durable \
            --ops "$BENCHMARK_TARGET_OPS" \
            --ops-list "$BENCHMARK_OPS_LIST" \
            --warmup "$BENCHMARK_WARMUP" \
            --customers "$BENCHMARK_CUSTOMERS" \
            --orders "$BENCHMARK_ORDERS" \
            --events "$BENCHMARK_EVENTS" \
            --docs-assets-dir docs/assets/benchmarks/python-embedded-compare \
            --benchmarks-doc-path docs/user-guide/benchmarks.md \
            --output .tmp/benchmark-assets/workload_c

      - name: Verify workload C engine coverage
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          expected = {"sqlite", "duckdb", "decentdb", "h2", "derby", "hsqldb"}
          root = Path(".tmp/benchmark-assets/workload_c")
          status_paths = sorted(root.glob("ops_*/engine_status.json"))
          if not status_paths:
              raise SystemExit(f"no engine_status.json files found under {root}")

          issues = []
          for status_path in status_paths:
              statuses = json.loads(status_path.read_text(encoding="utf-8"))
              present = set(statuses)
              missing = sorted(expected - present)
              if missing:
                  issues.append(f"{status_path.parent.name}: missing statuses for {', '.join(missing)}")
              for engine in sorted(expected):
                  info = statuses.get(engine, {})
                  status = info.get("status")
                  if status != "completed":
                      issues.append(
                          f"{status_path.parent.name}: {engine} -> {status or 'missing'} ({info.get('reason', '')})"
                      )

          if issues:
              print("workload_c did not complete for every expected engine:", file=sys.stderr)
              for issue in issues:
                  print(f"  - {issue}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Refresh workload A docs assets and markdown
        shell: bash
        run: |
          set -euo pipefail
          python benchmarks/python_embedded_compare/comparison_runner.py \
            --config .tmp/benchmark-assets/config/database_configs.yaml \
            --engines "$BENCHMARK_ENGINES" \
            --workload workload_a \
            --scenario benchmark-assets \
            --transaction-mode batched \
            --durability durable \
            --ops "$BENCHMARK_TARGET_OPS" \
            --ops-list "$BENCHMARK_OPS_LIST" \
            --warmup "$BENCHMARK_WARMUP" \
            --customers "$BENCHMARK_CUSTOMERS" \
            --orders "$BENCHMARK_ORDERS" \
            --events "$BENCHMARK_EVENTS" \
            --docs-assets-dir docs/assets/benchmarks/python-embedded-compare \
            --benchmarks-doc-path docs/user-guide/benchmarks.md \
            --update-benchmarks-doc \
            --output .tmp/benchmark-assets/workload_a

      - name: Verify docs exports
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          expected_status_engines = {"sqlite", "duckdb", "decentdb", "h2", "derby", "hsqldb"}
          expected_docs_engines = {
              "SQLite_wal_full",
              "DuckDB",
              "DecentDB",
              "H2(JDBC)",
              "Apache Derby(JDBC)",
              "HSQLDB(JDBC)",
          }

          for workload in ("workload_a", "workload_c"):
              run_root = Path(".tmp/benchmark-assets") / workload
              status_paths = sorted(run_root.glob("ops_*/engine_status.json"))
              if not status_paths:
                  raise SystemExit(f"no engine_status.json files found under {run_root}")
              issues = []
              for status_path in status_paths:
                  statuses = json.loads(status_path.read_text(encoding="utf-8"))
                  missing = sorted(expected_status_engines - set(statuses))
                  if missing:
                      issues.append(
                          f"{workload}/{status_path.parent.name}: missing statuses for {', '.join(missing)}"
                      )
                  for engine in sorted(expected_status_engines):
                      info = statuses.get(engine, {})
                      status = info.get("status")
                      if status != "completed":
                          issues.append(
                              f"{workload}/{status_path.parent.name}: {engine} -> {status or 'missing'} ({info.get('reason', '')})"
                          )
              if issues:
                  print(f"{workload} did not complete for every expected engine:", file=sys.stderr)
                  for issue in issues:
                      print(f"  - {issue}", file=sys.stderr)
                  sys.exit(1)

              chart_path = (
                  Path("docs/assets/benchmarks/python-embedded-compare")
                  / workload
                  / "chart_data.json"
              )
              rows = json.loads(chart_path.read_text(encoding="utf-8"))
              present = {str(row["engine"]) for row in rows}
              missing = sorted(expected_docs_engines - present)
              if missing:
                  print(
                      f"{workload} chart export is missing engines: {', '.join(missing)}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
          PY

      - name: Prepare root README comparison subset
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          
          keep = {
              value.strip()
              for value in os.environ["ROOT_README_EXTRA_ENGINES"].split(",")
              if value.strip()
          }
          run_root = Path(".tmp/benchmark-assets/workload_c")
          target_ops = os.environ["BENCHMARK_TARGET_OPS"].strip()
          candidates = [
              run_root / f"ops_{target_ops}" / "results_merged.json",
              run_root / "results_merged.json",
              *sorted(run_root.glob("ops_*/results_merged.json")),
          ]
          src = next((candidate for candidate in candidates if candidate.exists()), None)
          if src is None:
              found = sorted(str(path.relative_to(run_root)) for path in run_root.glob("**/results_merged.json"))
              details = ", ".join(found) if found else "none"
              raise SystemExit(
                  f"could not find workload_c results_merged.json under {run_root}; found: {details}"
              )
          dst = Path(".tmp/benchmark-assets/root-readme-results.json")

          document = json.loads(src.read_text(encoding="utf-8"))
          results = [
              row
              for row in document.get("results", [])
              if row.get("engine") in keep
          ]
          dst.write_text(json.dumps({"results": results}, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Merge README benchmark summary inputs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/aggregate_benchmarks.py \
            --native-summary data/bench_summary.json \
            --python-embedded-compare-results .tmp/benchmark-assets/root-readme-results.json \
            --output data/bench_summary.json \
            --target-operations "$BENCHMARK_TARGET_OPS"

      - name: Verify root README benchmark summary coverage
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          expected = {"decentdb", "duckdb", "sqlite", "H2", "HSQLDB"}
          summary = json.loads(Path("data/bench_summary.json").read_text(encoding="utf-8"))
          present = set(summary.get("engines", {}))
          missing = sorted(expected - present)
          if missing:
              print(
                  "root benchmark summary is missing expected engines: "
                  + ", ".join(missing),
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Generate README benchmark assets
        shell: bash
        run: |
          set -euo pipefail
          python scripts/make_readme_chart.py
          python scripts/visualize_alternative.py

      - name: Show benchmark asset diff
        shell: bash
        run: |
          set -euo pipefail
          git --no-pager status --short
          git --no-pager diff --stat -- \
            assets \
            data/bench_summary.json \
            docs/assets/benchmarks/python-embedded-compare \
            docs/user-guide/benchmarks.md

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-assets-${{ github.run_id }}
          path: |
            assets/decentdb-benchmarks.svg
            assets/decentdb-benchmarks.png
            assets/decentdb-radar.png
            assets/decentdb-speedup.png
            data/bench_summary.json
            docs/assets/benchmarks/python-embedded-compare
            docs/user-guide/benchmarks.md
            .tmp/benchmark-assets/workload_a
            .tmp/benchmark-assets/workload_c
            .tmp/benchmark-assets/root-readme-results.json
          retention-days: 14

      - name: Create GitHub App token
        if: github.ref == 'refs/heads/main'
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BENCHMARK_APP_ID }}
          private-key: ${{ secrets.BENCHMARK_APP_PRIVATE_KEY }}

      - name: Commit benchmark assets to main
        id: commit
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            assets/decentdb-benchmarks.svg \
            assets/decentdb-benchmarks.png \
            assets/decentdb-radar.png \
            assets/decentdb-speedup.png \
            data/bench_summary.json \
            docs/assets/benchmarks/python-embedded-compare \
            docs/user-guide/benchmarks.md

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore: refresh benchmark assets [skip ci]"

          token="${APP_TOKEN:-$GH_TOKEN}"
          git push "https://x-access-token:${token}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main

          echo "changed=true" >> "$GITHUB_OUTPUT"
