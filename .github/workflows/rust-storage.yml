name: Rust Storage Foundation

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  storage-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clippy
        run: cargo clippy -p decentdb --all-targets -- -D warnings

      - name: Storage Tests
        run: cargo test -p decentdb

      - name: Short Crash Harness
        run: python tests/harness/runner.py tests/harness/scenarios/short_crash.json

  storage-soak:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Soak Harness
        run: python tests/harness/runner.py tests/harness/scenarios/soak_storage.json
