name: Rust Storage Foundation

on:
  workflow_dispatch:

jobs:
  storage-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Storage Tests
        run: cargo test -p decentdb

      - name: Short Crash Harness
        run: python tests/harness/runner.py tests/harness/scenarios/short_crash.json

  storage-soak:
    needs: [storage-fast]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Soak Harness
        run: python tests/harness/runner.py tests/harness/scenarios/soak_storage.json
