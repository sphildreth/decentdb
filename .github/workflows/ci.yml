name: CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: github.event_name != 'push' || !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Format Check
        shell: bash
        run: |
          set -o pipefail
          if ! cargo fmt --check 2>&1 | tee /tmp/fmt-check.log; then
            echo "::error::Code formatting issues detected"
            echo "::group::Details"
            cat /tmp/fmt-check.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    if: github.event_name != 'push' || !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Engine & CLI Tests
        run: cargo test --workspace

  web-wasm-smoke:
    if: github.event_name != 'push' || !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: bindings/web/package-lock.json

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.114 --locked

      - name: Build web package
        working-directory: bindings/web
        run: |
          npm ci
          npm run build

      - name: Build wasm package artifact
        run: |
          cargo build -p decentdb --target wasm32-unknown-unknown --release
          wasm-bindgen target/wasm32-unknown-unknown/release/decentdb.wasm \
            --target web \
            --out-dir bindings/web/dist \
            --out-name decentdb_wasm

      - name: Install browser
        working-directory: bindings/web
        run: npm run browser:install:ci

      - name: Browser OPFS smoke
        working-directory: bindings/web
        run: npm run browser:smoke:ci
