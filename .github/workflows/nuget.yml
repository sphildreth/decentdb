name: Publish NuGet.org (.NET packages)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-native:
    name: Build native (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: windows-latest
            rid: win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native library (Rust cdylib)
        run: cargo build -p decentdb --release

      - name: Stage native artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out

          case "${{ matrix.rid }}" in
            linux-x64)
              cp -v target/release/libdecentdb.so out/libdecentdb.so
              test -f out/libdecentdb.so
              ;;
            osx-x64)
              cp -v target/release/libdecentdb.dylib out/libdecentdb.dylib
              test -f out/libdecentdb.dylib
              ;;
            win-x64)
              cp -v target/release/decentdb.dll out/decentdb.dll
              test -f out/decentdb.dll
              ;;
            *)
              echo "Unsupported RID: ${{ matrix.rid }}" >&2
              exit 1
              ;;
          esac

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: out/

  pack-and-push:
    name: Pack + publish NuGet.org
    runs-on: ubuntu-latest
    needs: [build-native]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native

      - name: Stage native files for packaging
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build
          cp -v native/native-linux-x64/libdecentdb.so build/libdecentdb.so
          cp -v native/native-osx-x64/libdecentdb.dylib build/libdecentdb.dylib
          cp -v native/native-win-x64/decentdb.dll build/decentdb.dll

      - name: Compute NuGet version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          # Tags are expected to be:
          # - vX.Y.Z
          # - vX.Y.Z-rc.N
          if [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-rc\.([0-9]+))?$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            rc_num="${BASH_REMATCH[5]:-}"

            nuget="${major}.${minor}.${patch}"
            if [[ -n "$rc_num" ]]; then
              nuget+="-rc.${rc_num}"
            fi
          else
            echo "Unsupported tag: $tag (expected vX.Y.Z or vX.Y.Z-rc.N)" >&2
            exit 1
          fi

          echo "nuget_version=$nuget" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore bindings/dotnet/DecentDB.NET.sln

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          dotnet pack \
            -c Release \
            --no-restore \
            -p:PackageVersion="${{ steps.ver.outputs.nuget_version }}" \
            -o ./artifacts \
            bindings/dotnet/src/DecentDB.AdoNet/DecentDB.AdoNet.csproj
          dotnet pack \
            -c Release \
            --no-restore \
            -p:PackageVersion="${{ steps.ver.outputs.nuget_version }}" \
            -o ./artifacts \
            bindings/dotnet/src/DecentDB.MicroOrm/DecentDB.MicroOrm.csproj
          dotnet pack \
            -c Release \
            --no-restore \
            -p:PackageVersion="${{ steps.ver.outputs.nuget_version }}" \
            -o ./artifacts \
            bindings/dotnet/src/DecentDB.EntityFrameworkCore/DecentDB.EntityFrameworkCore.csproj
          dotnet pack \
            -c Release \
            --no-restore \
            -p:PackageVersion="${{ steps.ver.outputs.nuget_version }}" \
            -o ./artifacts \
            bindings/dotnet/src/DecentDB.EntityFrameworkCore.Design/DecentDB.EntityFrameworkCore.Design.csproj
          dotnet pack \
            -c Release \
            --no-restore \
            -p:PackageVersion="${{ steps.ver.outputs.nuget_version }}" \
            -o ./artifacts \
            bindings/dotnet/src/DecentDB.EntityFrameworkCore.NodaTime/DecentDB.EntityFrameworkCore.NodaTime.csproj

      - name: Verify DecentDB.AdoNet package contents
        shell: bash
        run: |
          set -euo pipefail
          pkg="$(ls ./artifacts/DecentDB.AdoNet.*.nupkg | head -n1)"
          unzip -l "$pkg" | grep -q "lib/net10.0/DecentDB.AdoNet.dll"
          unzip -l "$pkg" | grep -q "lib/net10.0/DecentDB.Native.dll"
          unzip -l "$pkg" | grep -q "runtimes/linux-x64/native/libdecentdb.so"
          unzip -l "$pkg" | grep -q "runtimes/osx-x64/native/libdecentdb.dylib"
          unzip -l "$pkg" | grep -q "runtimes/win-x64/native/decentdb.dll"

      - name: Verify DecentDB.MicroOrm package contents
        shell: bash
        run: |
          set -euo pipefail
          pkg="$(ls ./artifacts/DecentDB.MicroOrm.*.nupkg | head -n1)"
          unzip -l "$pkg" | grep -q "lib/net10.0/DecentDB.MicroOrm.dll"
          unzip -l "$pkg" | grep -q "lib/net10.0/DecentDB.AdoNet.dll"
          unzip -l "$pkg" | grep -q "lib/net10.0/DecentDB.Native.dll"
          unzip -l "$pkg" | grep -q "runtimes/linux-x64/native/libdecentdb.so"
          unzip -l "$pkg" | grep -q "runtimes/osx-x64/native/libdecentdb.dylib"
          unzip -l "$pkg" | grep -q "runtimes/win-x64/native/decentdb.dll"

      - name: Verify EF Core package contents
        shell: bash
        run: |
          set -euo pipefail
          pkg="$(ls ./artifacts/DecentDB.EntityFrameworkCore.*.nupkg | head -n1)"
          unzip -l "$pkg" | grep -q "lib/net10.0/DecentDB.EntityFrameworkCore.dll"

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$NUGET_API_KEY" ]; then
            dotnet nuget push ./artifacts/*.nupkg \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          else
            echo "NUGET_API_KEY not set, skipping NuGet.org publish"
            exit 1
          fi
