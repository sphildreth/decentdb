name: Nightly Extended

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  extended:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "25"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-minify-plugin mkdocs-material mkdocs-awesome-pages-plugin mkdocs-mermaid2-plugin

      - name: Format Check
        run: |
          echo "Checking Rust code formatting..."
          if ! cargo fmt --check 2>&1 | tee /tmp/fmt-check.log; then
            echo ""
            echo "::error::Code formatting issues detected"
            echo ""
            echo "Formatting diffs (run 'cargo fmt' to fix):"
            echo "::group::Details"
            cat /tmp/fmt-check.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Workspace Checks
        run: |
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Short Crash Harness
        run: python tests/harness/runner.py tests/harness/scenarios/short_crash.json

      - name: Build cdylib
        run: cargo build -p decentdb

      - name: Python Binding Test Suite
        run: |
          cd bindings/python
          pip install -e .
          pytest -v tests/
          cd ../..

      - name: .NET Binding Test Suite
        run: |
          cd bindings/dotnet
          dotnet clean
          dotnet build
          dotnet test --verbosity normal
          cd ../..

      - name: Binding Smoke Tests (Go, Java, Node, Dart, C)
        run: |
          bash tests/bindings/c/run.sh
          go run ./tests/bindings/go/smoke.go
          javac tests/bindings/java/Smoke.java
          java --enable-native-access=ALL-UNNAMED -cp tests/bindings/java Smoke
          bash tests/bindings/node/build.sh
          node tests/bindings/node/smoke.js
          cd tests/bindings/dart
          dart pub get
          dart run smoke.dart
          cd ../../..

      - name: Storage Soak Harness
        run: python tests/harness/runner.py tests/harness/scenarios/soak_storage.json

      - name: Release Benchmarks
        run: cargo bench -p decentdb --bench release_metrics

      - name: Docs Build
        run: |
          cargo test -p decentdb --doc
          cargo doc --workspace --no-deps
          mkdocs build --config-file mkdocs.yml --site-dir site
