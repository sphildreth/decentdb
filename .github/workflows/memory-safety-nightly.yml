name: Memory Safety Nightly

on:
  schedule:
    # Run nightly after the benchmark workflow.
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: memory-safety-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-sanitizers:
    name: Rust ${{ matrix.sanitizer }} Sanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # ThreadSanitizer needs a fully sanitizer-built std/dependency graph and
        # is not reliable in this lightweight nightly setup yet.
        sanitizer: [address, leak]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build with ${{ matrix.sanitizer }} sanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
          RUSTDOCFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
        run: cargo build -p decentdb --target x86_64-unknown-linux-gnu

      - name: Run tests with ${{ matrix.sanitizer }} sanitizer
        env:
          RUSTFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
          RUSTDOCFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
          # ASAN/LSAN need single-threaded execution for reliable results
          RUST_TEST_THREADS: "1"
        run: |
          cargo test -p decentdb --target x86_64-unknown-linux-gnu -- --test-threads=1

  rust-miri:
    name: Rust Miri (Undefined Behavior)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Setup Miri
        run: cargo miri setup

      - name: Run Miri smoke binary
        # Integration-test targets pull in the crate dev-dependency graph under
        # Miri, which includes heavy benchmark/comparison crates that are not
        # relevant to UB checking here. Run a tiny release-profile binary
        # instead so Miri interprets a smaller optimized program focused on a
        # minimal pager/snapshot/transaction path within the 30-minute budget.
        run: cargo miri run -p decentdb --release --bin miri_smoke

  python-leak-regressions:
    name: Python Leak Regressions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/bindings/python
      DECENTDB_NATIVE_LIB: ${{ github.workspace }}/target/debug/libdecentdb.so

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e bindings/python
          pip install pytest psutil

      - name: Build native library
        run: cargo build -p decentdb --quiet

      - name: Run focused leak regressions
        run: |
          set -euo pipefail
          mkdir -p .tmp/memory-safety

          # Run both allocator-aware resource tests and the direct repeated
          # open/query/close RSS regression that caught a real engine issue.
          pytest -v \
            bindings/python/tests/test_memory_leak.py \
            bindings/python/tests/test_open_close_leak.py \
            bindings/python/tests/test_lifecycle_leak_smoke.py \
            bindings/python/tests/test_resource_management.py \
            bindings/python/tests/test_threading.py::TestMemoryLeaks \
            bindings/python/tests/test_cross_connection_visibility.py \
            --junitxml=.tmp/memory-safety/python-leaks.xml

      - name: Upload Python leak test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-leak-report
          path: .tmp/memory-safety/python-leaks.xml
          retention-days: 30

  c-abi-valgrind:
    name: C ABI Valgrind
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind build-essential

      - name: Build native library
        run: cargo build -p decentdb --quiet

      - name: Compile C memory-safety probes
        run: |
          set -euo pipefail
          mkdir -p .tmp/memory-safety
          cc \
            -Iinclude \
            tests/bindings/c/smoke.c \
            -Ltarget/debug \
            -Wl,-rpath,"$PWD/target/debug" \
            -ldecentdb \
            -o .tmp/memory-safety/c-smoke
          cc \
            -Iinclude \
            tests/bindings/c/memory_churn.c \
            -Ltarget/debug \
            -Wl,-rpath,"$PWD/target/debug" \
            -ldecentdb \
            -o .tmp/memory-safety/c-memory-churn

      - name: Run Valgrind memcheck
        run: |
          set -euo pipefail
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=definite,possible \
            --track-origins=yes \
            --num-callers=20 \
            --error-exitcode=1 \
            ./.tmp/memory-safety/c-smoke \
            2>&1 | tee .tmp/memory-safety/valgrind-c-smoke.log
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=all \
            --errors-for-leak-kinds=definite,possible \
            --track-origins=yes \
            --num-callers=20 \
            --error-exitcode=1 \
            ./.tmp/memory-safety/c-memory-churn /tmp/decentdb-memory-churn.ddb 200 \
            2>&1 | tee .tmp/memory-safety/valgrind-c-memory-churn.log

      - name: Upload Valgrind logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-c-logs
          path: |
            .tmp/memory-safety/valgrind-c-smoke.log
            .tmp/memory-safety/valgrind-c-memory-churn.log
          retention-days: 30

  python-valgrind:
    name: Python Valgrind
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/bindings/python
      DECENTDB_NATIVE_LIB: ${{ github.workspace }}/target/debug/libdecentdb.so

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e bindings/python
          pip install pytest psutil

      - name: Build native library
        run: cargo build -p decentdb --quiet

      - name: Run Python leak probe under Valgrind
        run: |
          set -euo pipefail
          mkdir -p .tmp/memory-safety
          
          # Memcheck is the leak oracle here. RSS-threshold tests are valid in
          # the plain Python regression job, but become noisy under Valgrind.
          valgrind \
            --tool=memcheck \
            --leak-check=full \
            --show-leak-kinds=definite,possible \
            --errors-for-leak-kinds=definite,possible \
            --track-origins=yes \
            --num-callers=20 \
            --error-exitcode=1 \
            --suppressions=.github/valgrind/python.supp \
            python -m pytest \
              bindings/python/tests/test_valgrind_memcheck.py \
              -v \
            2>&1 | tee .tmp/memory-safety/valgrind-python.log

      - name: Upload Python Valgrind logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-python-logs
          path: .tmp/memory-safety/valgrind-python.log
          retention-days: 30

  heap-profiling:
    name: Heap Profiling
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/bindings/python
      DECENTDB_NATIVE_LIB: ${{ github.workspace }}/target/debug/libdecentdb.so

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install heaptrack
        run: |
          sudo apt-get update
          sudo apt-get install -y heaptrack

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e bindings/python
          pip install pytest psutil

      - name: Build native library
        run: cargo build -p decentdb --quiet

      - name: Run heaptrack on Python leak tests
        run: |
          set -euo pipefail
          mkdir -p .tmp/memory-safety
          
          heaptrack -o .tmp/memory-safety/heaptrack-python \
            python -m pytest \
              bindings/python/tests/test_memory_leak.py \
              bindings/python/tests/test_open_close_leak.py \
              -v

      - name: Analyze heaptrack results
        run: |
          echo "=== Heaptrack Summary ===" 
          heaptrack_print .tmp/memory-safety/heaptrack-python.heaptrack.raw 2>&1 | head -100 || true

      - name: Upload heaptrack data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heaptrack-data
          path: .tmp/memory-safety/heaptrack-python.heaptrack.raw
          retention-days: 30

  stress-test:
    name: Long-running Stress Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}/bindings/python
      DECENTDB_NATIVE_LIB: ${{ github.workspace }}/target/debug/libdecentdb.so

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e bindings/python
          pip install psutil

      - name: Build native library
        run: cargo build -p decentdb --quiet

      - name: Run 30-minute stress test
        run: |
          set -euo pipefail
          mkdir -p .tmp/memory-safety
          
          python scripts/stress_memory_test.py \
            --duration 1800 \
            --db-path .tmp/memory-safety/stress.ddb \
            2>&1 | tee .tmp/memory-safety/stress-test.log

      - name: Upload stress test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: .tmp/memory-safety/stress-test.log
          retention-days: 30

  binding-lifecycle:
    name: Binding Lifecycle (${{ matrix.binding }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - binding: dotnet
          - binding: go
          - binding: java
          - binding: node
          - binding: dart

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up .NET
        if: matrix.binding == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Go
        if: matrix.binding == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Java
        if: matrix.binding == 'java'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        if: matrix.binding == 'node'
        uses: actions/setup-node@v5
        with:
          node-version: "25"

      - name: Set up Dart
        if: matrix.binding == 'dart'
        uses: dart-lang/setup-dart@v1

      - name: Build native library (debug)
        if: matrix.binding != 'java'
        run: cargo build -p decentdb --quiet

      - name: Build CLI (debug)
        if: matrix.binding == 'dotnet'
        run: cargo build -p decentdb-cli --quiet

      - name: Build native library (release)
        if: matrix.binding == 'java'
        run: cargo build -p decentdb --release --quiet

      - name: Prepare DBeaver plugin dir
        if: matrix.binding == 'java'
        run: mkdir -p .tmp/dbeaver/plugins

      - name: Run .NET lifecycle and leak coverage
        if: matrix.binding == 'dotnet'
        run: |
          export PATH="${GITHUB_WORKSPACE}/target/debug:$PATH"
          cd bindings/dotnet
          dotnet test DecentDB.NET.sln -v minimal
          dotnet test tests/DecentDB.Tests/DecentDB.Tests.csproj -v minimal --filter FullyQualifiedName~MemoryLeakTests

      - name: Run Go lifecycle and leak coverage
        if: matrix.binding == 'go'
        run: |
          cd bindings/go/decentdb-go
          LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/target/debug" go test ./...
          LD_LIBRARY_PATH="${GITHUB_WORKSPACE}/target/debug" go test ./... -run TestRepeatedOpenQueryCloseKeepsRSSBounded -count=1

      - name: Run Java lifecycle and leak coverage
        if: matrix.binding == 'java'
        env:
          DBEAVER_PLUGIN_DIR: ${{ github.workspace }}/.tmp/dbeaver/plugins
        run: |
          cd bindings/java
          ./gradlew --no-daemon :driver:test -PnativeLibDir="${GITHUB_WORKSPACE}/target/release" -PdbeaverPluginDir="${DBEAVER_PLUGIN_DIR}"
          ./gradlew --no-daemon :driver:test --tests com.decentdb.jdbc.MemoryLeakTest -PnativeLibDir="${GITHUB_WORKSPACE}/target/release" -PdbeaverPluginDir="${DBEAVER_PLUGIN_DIR}"

      - name: Run Node lifecycle and leak coverage
        if: matrix.binding == 'node'
        run: |
          cd bindings/node/decentdb
          npm ci
          npm run build --silent
          node --expose-gc --test test/*.test.js
          node --expose-gc --test test/memory_leak.test.js
          cd ../knex-decentdb
          npm ci
          node --test test/*.test.js

      - name: Run Dart lifecycle and leak coverage
        if: matrix.binding == 'dart'
        env:
          DECENTDB_NATIVE_LIB: ${{ github.workspace }}/target/debug/libdecentdb.so
        run: |
          cd bindings/dart/dart
          dart pub get
          dart test --reporter expanded
          DECENTDB_RUN_MEMORY_LEAK_TEST=1 dart test --reporter expanded test/memory_leak_test.dart --concurrency=1
