name: Release (GitHub)

on:
  push:
    tags: [
      "v*"
    ]

permissions:
  contents: write

jobs:
  build:
    name: Build artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download DBeaver plugins (for compile)
        shell: bash
        run: |
          set -euo pipefail
          repo_root="$PWD"
          dbeaver_dir="$repo_root/.dbeaver"
          mkdir -p "$dbeaver_dir"

          curl -fsSL -o "$dbeaver_dir/dbeaver.zip" \
            https://dbeaver.io/files/dbeaver-ce-latest-win32.win32.x86_64.zip

          python - "$dbeaver_dir/dbeaver.zip" "$dbeaver_dir" <<'PY'
          import sys, zipfile
          zip_path, dest = sys.argv[1], sys.argv[2]
          with zipfile.ZipFile(zip_path) as z:
              z.extractall(dest)
          PY

          test -d "$dbeaver_dir/dbeaver/plugins"
          echo "DBEAVER_PLUGIN_DIR=$dbeaver_dir/dbeaver/plugins" >> "$GITHUB_ENV"

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: "stable"

      - name: Build libpg_query (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
          cd /tmp/libpg_query
          make
          mkdir -p "$GITHUB_WORKSPACE/build/lib"
          cp libpg_query.a "$GITHUB_WORKSPACE/build/lib/"

      - name: Build libpg_query (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
          cd /tmp/libpg_query
          make
          mkdir -p "$GITHUB_WORKSPACE/build/lib"
          cp libpg_query.a "$GITHUB_WORKSPACE/build/lib/"

      - name: Build libpg_query (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          repo_root="$PWD"
          git clone --depth 1 https://github.com/pganalyze/libpg_query.git /tmp/libpg_query
          cd /tmp/libpg_query
          make
          mkdir -p "$repo_root/build/lib"
          cp libpg_query.a "$repo_root/build/lib/"

      - name: Install dependencies
        run: nimble setup -y

      - name: Pin libpg_query linker path
        shell: bash
        run: |
          set -euo pipefail
          repo_root="$PWD"
          target_lib="$repo_root/build/lib/libpg_query.a"

          if [ ! -f "$target_lib" ]; then
            if [ ! -f /tmp/libpg_query/libpg_query.a ] && [ -d /tmp/libpg_query ]; then
              make -C /tmp/libpg_query
            fi
            mkdir -p "$repo_root/build/lib"
            cp /tmp/libpg_query/libpg_query.a "$target_lib"
          fi

          test -f "$target_lib"

          python - <<'PY'
          from pathlib import Path

          cfg = Path("nim.cfg")
          abs_lib = (Path.cwd() / "build" / "lib" / "libpg_query.a").as_posix()
          lines = cfg.read_text().splitlines()

          replaced = False
          for i, line in enumerate(lines):
            if line.startswith('--passL:"') and 'libpg_query.a' in line:
              lines[i] = f'--passL:"{abs_lib}"'
              replaced = True
              break

          if not replaced:
            lines.append(f'--passL:"{abs_lib}"')

          cfg.write_text("\n".join(lines) + "\n")
          PY

          ls -l "$target_lib"

      - name: Build CLI (release)
        run: nimble build -d:release

      - name: Build native library (C API)
        run: nimble build_lib

      - name: Build JNI bridge native library
        shell: bash
        run: |
          set -euo pipefail
          make -C bindings/java/native clean all

      - name: Build JDBC driver + DBeaver plugin
        shell: bash
        run: |
          set -euo pipefail
          cd bindings/java
          ./gradlew --no-daemon :driver:jar :dbeaver-extension:jar -PnativeLibDir="$GITHUB_WORKSPACE/build" -PdbeaverPluginDir="$DBEAVER_PLUGIN_DIR"

          mkdir -p "$GITHUB_WORKSPACE/dbeaver-dist/dbeaver/plugins"
          # Name the bundle jar in the conventional DBeaver/OSGi style.
          cp -v dbeaver-extension/build/libs/dbeaver-extension-*.jar "$GITHUB_WORKSPACE/dbeaver-dist/dbeaver/plugins/org.jkiss.dbeaver.ext.decentdb_${GITHUB_REF_NAME#v}.jar"
          cp -v driver/build/libs/driver-*.jar "$GITHUB_WORKSPACE/decentdb-jdbc-${GITHUB_REF_NAME}-${RUNNER_OS}.jar"

      - name: Stage artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp -v ./decentdb dist/
          if [ -f ./build/libc_api.so ]; then cp -v ./build/libc_api.so dist/libdecentdb.so; fi
          if [ -f ./build/libc_api.dylib ]; then cp -v ./build/libc_api.dylib dist/libdecentdb.dylib; fi
          if [ -f ./build/libdecentdb.so ]; then cp -v ./build/libdecentdb.so dist/libdecentdb.so; fi
          if [ -f ./build/libdecentdb.dylib ]; then cp -v ./build/libdecentdb.dylib dist/libdecentdb.dylib; fi

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item -Force .\decentdb.exe dist\
          if (Test-Path .\build\c_api.dll) { Copy-Item -Force .\build\c_api.dll dist\decentdb.dll }
          if (Test-Path .\build\libc_api.dll) { Copy-Item -Force .\build\libc_api.dll dist\decentdb.dll }
          if (Test-Path .\build\decentdb.dll) { Copy-Item -Force .\build\decentdb.dll dist\decentdb.dll }
          if (!(Test-Path .\dist\decentdb.dll)) { throw "Native DLL not found" }

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUT="decentdb-${TAG}-${{ runner.os }}-x64.tar.gz"
          tar -C dist -czf "$OUT" .

      - name: Package DBeaver plugin (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          OUT="decentdb-dbeaver-${GITHUB_REF_NAME}-${RUNNER_OS}.zip"
          cd dbeaver-dist
          zip -r "../$OUT" dbeaver

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "$env:GITHUB_REF_NAME"
          $out = "decentdb-$tag-$env:RUNNER_OS-x64.zip"
          Compress-Archive -Path dist\* -DestinationPath $out -Force

      - name: Package DBeaver plugin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $out = "decentdb-dbeaver-$env:GITHUB_REF_NAME-$env:RUNNER_OS.zip"
          if (Test-Path $out) { Remove-Item -Force $out }
          Compress-Archive -Path dbeaver-dist\dbeaver -DestinationPath $out -Force

      - name: Upload artifact
        uses: Wandalen/wretry.action@v3.8.0
        with:
          attempt_limit: 3
          attempt_delay: 10000
          action: actions/upload-artifact@v4
          with: |
            name: release-${{ matrix.os }}
            path: |
              decentdb-${{ github.ref_name }}-${{ runner.os }}-x64.tar.gz
              decentdb-${{ github.ref_name }}-${{ runner.os }}-x64.zip
              decentdb-jdbc-${{ github.ref_name }}-${{ runner.os }}.jar
              decentdb-dbeaver-${{ github.ref_name }}-${{ runner.os }}.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ startsWith(github.ref_name, 'v0.1.') || startsWith(github.ref_name, 'v1.0.0-rc.') || startsWith(github.ref_name, 'v1.0.1-rc.') || startsWith(github.ref_name, 'v1.1.0-rc.') || startsWith(github.ref_name, 'v1.1.1-rc.') || startsWith(github.ref_name, 'v1.1.2-rc.') }}
          files: |
            artifacts/**/decentdb-${{ github.ref_name }}-Linux-x64.tar.gz
            artifacts/**/decentdb-${{ github.ref_name }}-macOS-x64.tar.gz
            artifacts/**/decentdb-${{ github.ref_name }}-Windows-x64.zip
            artifacts/**/decentdb-jdbc-${{ github.ref_name }}-Linux.jar
            artifacts/**/decentdb-jdbc-${{ github.ref_name }}-macOS.jar
            artifacts/**/decentdb-jdbc-${{ github.ref_name }}-Windows.jar
            artifacts/**/decentdb-dbeaver-${{ github.ref_name }}-Linux.zip
            artifacts/**/decentdb-dbeaver-${{ github.ref_name }}-macOS.zip
            artifacts/**/decentdb-dbeaver-${{ github.ref_name }}-Windows.zip
