name: decentdb_flutter
description: Flutter mobile integration helpers for the DecentDB Dart FFI package.
version: 2.7.0
publish_to: none
repository: https://github.com/sphildreth/decentdb
homepage: https://github.com/sphildreth/decentdb/tree/main/bindings/dart/flutter

environment:
  sdk: ^3.0.0
  flutter: ">=3.16.0"

dependencies:
  decentdb:
    path: ../dart
  flutter:
    sdk: flutter
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: dev.decentdb.decentdb_flutter
        pluginClass: DecentdbFlutterPlugin
      ios:
        pluginClass: DecentdbFlutterPlugin
