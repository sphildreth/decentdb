# DecentDB benchmark targets
#
# This file defines the initial "gold standard" thresholds for DecentDB's
# benchmark system. The intent is:
# - floor: below this, a P0 metric is not acceptable
# - target: good enough to publish confidently
# - stretch: exceptional / elite
#
# These are initial estimates, not permanent truth. They should be revised as
# the benchmark runner matures and authoritative release-mode baselines exist.
#
# The primary external anchor is SQLite, not because DecentDB must copy SQLite's
# exact behavior, but because SQLite is the dominant embedded relational engine
# users will mentally compare against. DuckDB is included as a benchmark-process
# anchor: performance work should be tied to explicit benchmark suites and
# repeatable regression tracking.

format_version = 1

[metadata]
name = "DecentDB benchmark targets"
status = "initial_estimates"
owner = "DecentDB"
authoritative_host_class = "linux_x86_64_local_ssd"
authoritative_build = "release"
authoritative_benchmark_profile = "nightly"
default_workload = "oltp_narrow_v1"
default_reference_engine = "sqlite"
notes = [
  "Targets are for authoritative release-mode runs on a quiet Linux x86_64 host with local SSD storage.",
  "Use floors to gate regressions, targets to define 'good', and stretch values to define 'elite'.",
  "Point lookup, recovery, and checkpoint targets are intentionally ambitious but still chosen to feel locally embedded rather than client/server-like.",
  "Storage targets emphasize normalized footprint metrics such as space amplification, not raw file size, because schema and dataset shape change absolute bytes.",
]

[rating]
gate_priority = "P0"
red_if_any_p0_below_floor = true
yellow_if_all_p0_at_least_floor_but_any_p0_below_target = true
green_requires_all_p0_at_least_target = true
gold_requires_all_p0_at_least_target = true
gold_min_signature_metrics_at_stretch = 4
elite_requires_all_p0_at_least_target = true
elite_min_signature_metrics_at_stretch = 7
elite_requires_no_metric_below_target = true

[[reference]]
id = "sqlite_np1_query"
engine = "sqlite"
kind = "official_doc"
url = "https://www.sqlite.org/np1queryprob.html"
note = "SQLite shows that many small in-process queries can remain efficient; warm read and startup-path targets should feel local and low-overhead."

[[reference]]
id = "sqlite_faster_than_fs"
engine = "sqlite"
kind = "official_doc"
url = "https://www.sqlite.org/fasterthanfs.html"
note = "SQLite shows embedded database storage can be competitive on latency and compact on disk, but also makes clear that host and workload variance are large."

[[reference]]
id = "duckdb_benchmark_suite"
engine = "duckdb"
kind = "official_doc"
url = "https://duckdb.org/docs/1.3/dev/benchmark"
note = "DuckDB reinforces the operational model: explicit benchmark suites, repeated measurements, and regression-aware performance work."

[[metric]]
id = "durable_commit_single.txn_p95_us"
display_name = "Durable single-row transaction p95"
scenario = "durable_commit_single"
metric = "txn_p95_us"
priority = "P0"
phase = 1
signature = true
direction = "smaller_is_better"
unit = "microseconds"
weight = 1.00
floor = 3000.0
target = 1500.0
stretch = 800.0
cache_mode = "real_fs"
durability_mode = "full"
likely_owners = ["wal", "pager", "vfs"]
assumptions = [
  "release build on authoritative host class",
  "single-row explicit transactions",
  "oltp_narrow_v1 workload",
]

