engines:
  sqlite:
    enabled: true
    variant: wal_full
  
  duckdb:
    enabled: true
  
  decentdb:
    enabled: true
  
  h2:
    enabled: true
    jdbc_url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
    driver_class: org.h2.Driver
    jar_paths:
      - /tmp/h2.jar

  derby:
    enabled: true
    jdbc_url: jdbc:derby:{db_path};create=true
    driver_class: org.apache.derby.iapi.jdbc.AutoloadedDriver
    jar_paths:
      - /opt/Apache/db-derby/lib/derby.jar
      - /opt/Apache/db-derby/lib/derbyshared.jar

  hsqldb:
    enabled: true
    jdbc_url: jdbc:hsqldb:file:{db_path};hsqldb.write_delay=false
    driver_class: org.hsqldb.jdbc.JDBCDriver
    jar_paths:
      - /usr/share/java/hsqldb.jar

dataset:
  seed: 42
  customers_n: 100
  orders_n: 500
  events_n: 500

benchmark:
  operations: 500
  warmup: 50
